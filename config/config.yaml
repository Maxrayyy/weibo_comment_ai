# 微博OAuth配置
weibo:
  app_key: "${WEIBO_APP_KEY}"
  app_secret: "${WEIBO_APP_SECRET}"
  redirect_uri: "https://api.weibo.com/oauth2/default.html"

# 大模型配置（兼容OpenAI SDK的任意平台）
llm:
  # 分析阶段（微博情绪/句式分析，低温度结构化输出）
  analyze:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3.5-flash"
  # 生成阶段（评论文本生成，高温度创意输出）
  generate:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3.5-flash"
    max_tokens: 150
# 评论策略配置
strategy:
  mode: "whitelist"               # whitelist 或 blacklist
  # 白名单用户UID列表，UID获取方法：
  # 打开用户微博主页，URL中 weibo.com/u/数字 即为UID
  # 例: https://weibo.com/u/1234567890 → UID为 1234567890
  # 白名单为空时自动从粉丝列表获取
  whitelist:
    - 5596465683
    - 7764227545
    - 7825404416
    - 6468390483
  blacklist: []                   # 黑名单用户UID列表
  daily_limit: 50                 # 每日评论上限
  skip_repost: true               # 跳过转发微博
  work_hours:
    start: 8                      # 工作开始时间
    end: 23                       # 工作结束时间

# 随机间隔配置（秒）
timing:
  poll_min: 20                   # 轮询最小间隔 2分钟
  poll_max: 50                   # 轮询最大间隔 5分钟
  comment_delay_min: 5            # 评论延迟最小 5秒
  comment_delay_max: 15           # 评论延迟最大 50秒

# 评论风格（引用prompts.yaml中的key）
base_prompt: "weibo_base"         # 单阶段隐式判断prompt
default_prompt: "weibo_base"      # 保留兼容性

# 好友圈评论配置
friend_group:
  enabled: true
  gid: "100097764254452"          # 好友圈分组ID（URL中的gid参数）
  scroll_times: 3                 # 页面滚动次数
  poll_min: 60                    # 轮询最小间隔（秒）
  poll_max: 120                   # 轮询最大间隔（秒）

# 超话功能配置（基于PC Cookie，无需手机抓包）
chaohua:
  enabled: false

  # 签到配置
  sign:
    enabled: true
    schedule: "08:00"             # 每日签到时间
    delay_min: 5                  # 签到间隔最小秒数
    delay_max: 10                 # 签到间隔最大秒数

  # 发帖配置
  post:
    enabled: false                # 默认关闭，需手动开启
    target_topics: []             # 目标超话containerid列表
    daily_limit: 5
    templates:                    # 发帖模板（随机选取）
      - "打卡"
      - "签到"

  # 超话评论配置
  comment:
    enabled: false
    target_topics: []             # 目标超话containerid列表
    daily_limit: 20
    poll_min: 120                 # 轮询最小间隔（秒）
    poll_max: 300                 # 轮询最大间隔（秒）
