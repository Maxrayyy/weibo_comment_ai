# 微博OAuth配置
weibo:
  app_key: "${WEIBO_APP_KEY}"
  app_secret: "${WEIBO_APP_SECRET}"
  redirect_uri: "https://api.weibo.com/oauth2/default.html"

# 大模型配置（兼容OpenAI SDK的任意平台）
llm:
  # 纯文字评论生成（无图片微博使用）
  text:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    max_tokens: 150
  # 多模态评论生成（有图片微博使用，需支持 image_url）
  multimodal:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-vl-plus"
    max_tokens: 150
# 评论策略配置
strategy:
  mode: "whitelist"               # whitelist 或 blacklist
  # 白名单用户UID列表，UID获取方法：
  # 打开用户微博主页，URL中 weibo.com/u/数字 即为UID
  # 例: https://weibo.com/u/1234567890 → UID为 1234567890
  # 白名单为空时自动从粉丝列表获取
  whitelist:
    - 5596465683
    - 7764227545
    - 7825404416
    - 6468390483
  blacklist: []                   # 黑名单用户UID列表
  daily_limit: 300                 # 每日评论上限
  skip_repost: true               # 跳过转发微博
  work_hours:
    start: 0                      # 工作开始时间
    end: 24                       # 工作结束时间（0-24 = 全天无限制）

# 随机间隔配置（秒）
timing:
  poll_min: 300                   # 轮询最小间隔 2分钟
  poll_max: 600                   # 轮询最大间隔 5分钟
  comment_delay_min: 20            # 评论延迟最小 5秒
  comment_delay_max: 50           # 评论延迟最大 50秒

# 评论风格（引用prompts.yaml中的key）
base_prompt: "weibo_base"         # 单阶段隐式判断prompt
default_prompt: "weibo_base"      # 保留兼容性

# 好友圈评论配置
friend_group:
  enabled: true
  gid: "100097764254452"          # 好友圈分组ID（URL中的gid参数）
  scroll_times: 3                 # 页面滚动次数
  poll_min: 180                    # 轮询最小间隔（秒）
  poll_max: 300                   # 轮询最大间隔（秒）

# 自动回复评论配置
reply:
  enabled: true
  daily_limit: 100                   # 每日回复上限
  poll_min: 100                      # 轮询最小间隔（秒）
  poll_max: 180                     # 轮询最大间隔（秒）
  reply_delay_min: 20                # 回复前延迟最小（秒）
  reply_delay_max: 60               # 回复前延迟最大（秒）
  prompt: "weibo_reply"             # 回复使用的prompt模板
  blacklist:                         # 不自动回复的用户UID列表
    - 5606716867                     # 吃瓜罗伯特
    - 5762999670

# 健康检查与告警配置
health:
  max_consecutive_failures: 6     # 连续失败N次后自动停止服务
  cookie_check_hours: 6           # Cookie有效性检查间隔（小时）

# 告警通知配置
notify:
  enabled: true
  email:
    smtp_host: "smtp.163.com"
    smtp_port: 465
    sender: "hzd16992004@163.com"
    password: "${NOTIFY_EMAIL_PASSWORD}"    # 163邮箱SMTP授权码（非登录密码）
    receiver: "hzd16992004@163.com"

# 超话功能配置（基于PC Cookie，无需手机抓包）
chaohua:
  enabled: false

  # 签到配置
  sign:
    enabled: true
    schedule: "08:00"             # 每日签到时间
    delay_min: 5                  # 签到间隔最小秒数
    delay_max: 10                 # 签到间隔最大秒数

  # 发帖配置
  post:
    enabled: false                # 默认关闭，需手动开启
    target_topics: []             # 目标超话containerid列表
    daily_limit: 5
    templates:                    # 发帖模板（随机选取）
      - "打卡"
      - "签到"

  # 超话评论配置
  comment:
    enabled: true
    target_topics: []             # 目标超话containerid列表
    daily_limit: 100
    poll_min: 120                 # 轮询最小间隔（秒）
    poll_max: 300                 # 轮询最大间隔（秒）
